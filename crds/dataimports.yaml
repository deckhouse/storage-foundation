apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dataimports.storage-foundation.deckhouse.io
  labels:
    heritage: deckhouse
    module: storage-foundation
    backup.deckhouse.io/cluster-config: "true"
spec:
  group: storage-foundation.deckhouse.io
  scope: Namespaced
  names:
    kind: DataImport
    plural: dataimports
    singular: dataimport
    shortNames:
      - di
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          # NOTE: the whole DataImport object is intentionally NOT immutable (unlike DataExport, which uses
          # x-kubernetes-immutable): only spec.mode and spec.snapshotRef are locked after creation, via the
          # CEL transition rules (self == oldSelf) below. Other spec fields (e.g. ttl) may still change.
          description: |
            Resource for importing data into a newly created PVC (CreatePVC) or producing a durable data
            artifact for an already-existing snapshot node (PopulateData).
          properties:
            spec:
              type: object
              required:
                - ttl
              x-kubernetes-validations:
                # PopulateData materializes the data leg of an existing snapshot node: it needs the node
                # ref (snapshotRef) and the transient scratch volume (storageParams), and forbids the
                # CreatePVC fields.
                - rule: "self.mode != 'PopulateData' || (has(self.snapshotRef) && has(self.storageParams))"
                  message: "mode PopulateData requires snapshotRef and storageParams."
                - rule: "self.mode != 'PopulateData' || !has(self.pvcTemplate)"
                  message: "mode PopulateData forbids pvcTemplate."
                # CreatePVC creates and populates a preserved PVC (pvcTemplate) and forbids the PopulateData
                # fields.
                - rule: "self.mode != 'CreatePVC' || has(self.pvcTemplate)"
                  message: "mode CreatePVC requires pvcTemplate."
                - rule: "self.mode != 'CreatePVC' || (!has(self.snapshotRef) && !has(self.storageParams))"
                  message: "mode CreatePVC forbids snapshotRef and storageParams."
                # pvcTemplate must name the PVC it creates.
                - rule: "!has(self.pvcTemplate) || (has(self.pvcTemplate.metadata) && has(self.pvcTemplate.metadata.name) && size(self.pvcTemplate.metadata.name) > 0)"
                  message: "pvcTemplate requires metadata.name."
                # mode is set once at creation and never changes (controllers and the state-snapshotter
                # reverse-lookup assume a stable mode for the object's lifetime).
                - rule: "self.mode == oldSelf.mode"
                  message: "mode is immutable"
              properties:
                ttl:
                  type: string
                  description: |
                    Time-to-live duration after the last user request.
                    
                    Acceptable values:
                    
                    - `<number>s`
                    - `<number>m`
                    - `<number>h`
                    
                    For example, `5m`, `2h45m`, or `1d`.
                  pattern: '^([0-9]+(\.[0-9]+)?h)?([0-9]+(\.[0-9]+)?m)?([0-9]+s)?$'
                publish:
                  type: boolean
                  description: Expose the importer pod outside the cluster.
                  default: false
                waitForFirstConsumer:
                  type: boolean
                  description: If set to `false`, a load pod is created to trigger volume population when the StorageClass has `volumeBindingMode` set to `WaitForFirstConsumer`.
                  default: true
                mode:
                  type: string
                  enum: ["CreatePVC", "PopulateData"]
                  default: CreatePVC
                  description: |
                    Discriminator selecting what the import does with the bytes:
                    
                    - `CreatePVC`: write into a preserved, newly created PVC (`pvcTemplate`). No durable
                      artifact.
                    - `PopulateData`: stage the bytes into a transient scratch volume (`storageParams`) and
                      capture them into a durable VolumeSnapshotContent for the already-existing snapshot node
                      referenced by `snapshotRef`.
                snapshotRef:
                  type: object
                  x-kubernetes-validations:
                    # snapshotRef binds the produced artifact to an existing snapshot node; the
                    # state-snapshotter reverse-lookup assumes a stable ref for the object's lifetime.
                    - rule: "self == oldSelf"
                      message: "snapshotRef is immutable"
                  description: |
                    PopulateData only. Reference to the already-existing xxxSnapshot node the produced
                    durable artifact belongs to (namespace implicit = the DataImport namespace). Set by the
                    external creator (d8/user/backup); the DataImport controller does not read it — it exists
                    so the state-snapshotter reverse-lookup can match the leaf against `spec.snapshotRef`.
                  required: ["kind", "name"]
                  properties:
                    apiVersion:
                      type: string
                      description: Group/version of the snapshot node (e.g. `snapshot.storage.k8s.io/v1`).
                    kind:
                      type: string
                      minLength: 1
                      description: Kind of the snapshot node (e.g. `VolumeSnapshot`, `VirtualDiskSnapshot`).
                    name:
                      type: string
                      minLength: 1
                      description: Name of the snapshot node.
                storageParams:
                  type: object
                  description: |
                    PopulateData only. Parameters of the transient scratch volume the imported bytes are
                    staged into before capture; it is destroyed after the durable VolumeSnapshotContent is
                    produced. Its StorageClass must be snapshot-capable (it references a VolumeSnapshotClass
                    via the `storage.deckhouse.io/volumesnapshotclass` annotation).
                  required: ["storageClassName", "size"]
                  properties:
                    storageClassName:
                      type: string
                      minLength: 1
                      description: StorageClass of the scratch PVC (must be snapshot-capable).
                    size:
                      type: string
                      minLength: 1
                      description: Requested size of the scratch PVC (a Kubernetes quantity, e.g. `10Gi`).
                    volumeMode:
                      type: string
                      enum: ["Block", "Filesystem"]
                      description: Volume mode of the scratch PVC. Defaults to `Filesystem` when omitted.
                pvcTemplate:
                  type: object
                  description: |
                    CreatePVC only. PersistentVolumeClaim template fully describing the target PVC the
                    imported bytes are written into; the PVC is preserved after the import.
                  properties:
                    metadata:
                      type: object
                      description: PersistentVolumeClaim metadata.
                      properties:
                        name:
                          type: string
                          description: PersistentVolumeClaim name.
                        labels:
                          type: object
                          description: PersistentVolumeClaim labels.
                          additionalProperties:
                            type: string
                        annotations:
                          type: object
                          description: PersistentVolumeClaim annotations.
                          additionalProperties:
                            type: string
                    spec:
                      type: object
                      description: PersistentVolumeClaim specification.
                      properties:
                        accessModes:
                          type: array
                          description: Desired access modes for the volume.
                          items:
                            type: string
                            enum:
                              [
                                "ReadWriteOnce",
                                "ReadOnlyMany",
                                "ReadWriteMany",
                                "ReadWriteOncePod",
                              ]
                        resources:
                          type: object
                          description: Minimum resource requirements for the volume.
                          properties:
                            requests:
                              type: object
                              description: Minimum amount of compute resources required.
                              additionalProperties:
                                anyOf:
                                  - type: integer
                                  - type: string
                                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                x-kubernetes-int-or-string: true
                        storageClassName:
                          type: string
                          description: Name of the StorageClass required by the PersistentVolumeClaim.
                        volumeMode:
                          type: string
                          description: Volume mode required by the PersistentVolumeClaim.
                          enum: ["Block", "Filesystem"]
            status:
              type: object
              description: DataImport resource status details.
              properties:
                url:
                  type: string
                  description: Internal URL of the importer service.
                ca:
                  type: string
                  description: Base64-encoded CA certificate for establishing a TLS connection to the importer pod.
                publicURL:
                  type: string
                  description: Public URL of the importer service.
                accessTimestamp:
                  type: string
                  format: date-time
                  description: Last access timestamp updated by the importer pod.
                volumeMode:
                  type: string
                  enum: ["Block", "Filesystem"]
                  description: |
                    Volume mode of the exported data.
                phase:
                  type: string
                  enum:
                    ["Pending", "Ready", "Completed", "Expired", "Failed", "Terminating"]
                  description: |
                    Coarse-grained lifecycle state, written exclusively by the controller:
                    Pending → Ready → Completed | Expired | Failed. `Terminating` denotes an object with a
                    deletion timestamp and is a transient state, not an outcome. `Expired` is a normal
                    terminal outcome (the idle-TTL window elapsed), not a failure.
                completionTimestamp:
                  type: string
                  format: date-time
                  description: |
                    Time the DataImport reached a terminal phase (Completed, Expired or Failed). Set once by
                    the controller; the garbage collector measures retention age from this timestamp.
                serverState:
                  type: string
                  enum: ["Ready", "Finished", "IdleExpired"]
                  description: |
                    Raw progress signal reported by the importer server pod (the only writer): `Ready` when
                    the server is serving, `Finished` when the client upload finished durably, `IdleExpired`
                    when the idle-TTL window elapsed. The controller derives phase and conditions from it.
                data:
                  type: object
                  description: |
                    Captured-data block for this import. Carries the durable cluster-scoped data artifact
                    under data.artifact (a VolumeSnapshotContent). Populated once the backing
                    VolumeCaptureRequest completes.
                  properties:
                    artifact:
                      type: object
                      description: |
                        Reference to the durable cluster-scoped data artifact produced by this import
                        (a VolumeSnapshotContent).
                      properties:
                        apiVersion:
                          type: string
                        kind:
                          type: string
                        name:
                          type: string
                        uid:
                          type: string
                          description: |
                            UID of the durable data artifact (for example the VolumeSnapshotContent UID),
                            making the reference self-contained. Optional; producers fill it best-effort.
                conditions:
                  type: array
                  items:
                    description: Array of conditions describing the current state of the DataImport resource.
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - message
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                        description: Condition type.
                        enum:
                          ["Ready", "UploadFinished", "Completed"]
                      status:
                        type: string
                        description: Condition status.
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                        description: Current condition status reason.
                        enum:
                          [
                            "Pending",
                            "PVCCreated",
                            "ServerReady",
                            "InProgress",
                            "Expired",
                            "Deleted",
                            "UploadFinished",
                            "Completed",
                            "Failed",
                            "PublishFailed",
                            "ValidationFailed",
                            "TargetNotFound",
                            "TargetNotReady",
                            "TargetFailed",
                            "PVConflict",
                            "DeploymentFailed",
                            "CleanupFailed",
                          ]
                      message:
                        description: |-
                          Human-readable message indicating details about the transition.

                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      lastTransitionTime:
                        description: |-
                          Last time the condition transitioned from one status to another.

                          This should be when the underlying condition changed.
                          If the last transition time is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      observedGeneration:
                        description: |-
                          The `.metadata.generation` that the condition was set based upon.

                          For instance, if `.metadata.generation` is currently 12, but the `.status.conditions[x].observedGeneration` is 9, the condition is out of date.
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer

      subresources:
        status: {}
      additionalPrinterColumns:
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Public URL
          type: string
          jsonPath: .status.publicURL
        - name: TTL
          type: string
          jsonPath: .spec.ttl
          priority: 1
        - name: Mode
          type: string
          jsonPath: .spec.mode
          priority: 1
        - name: Storage Class
          type: string
          jsonPath: .spec.storageParams.storageClassName
          priority: 1
        - name: Wait For Consumer
          type: boolean
          jsonPath: .spec.waitForFirstConsumer
          priority: 1
        - name: Status
          type: string
          description: The status of the DataImport resource.
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
