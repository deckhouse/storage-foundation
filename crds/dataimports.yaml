apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dataimports.storage-foundation.deckhouse.io
  labels:
    heritage: deckhouse
    module: storage-foundation
    backup.deckhouse.io/cluster-config: "true"
spec:
  group: storage-foundation.deckhouse.io
  scope: Namespaced
  names:
    kind: DataImport
    plural: dataimports
    singular: dataimport
    shortNames:
      - di
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          # NOTE: the whole DataImport object is intentionally NOT immutable (unlike DataExport, which uses
          # x-kubernetes-immutable): only spec.targetRef is locked after creation, via the CEL transition
          # rule (self == oldSelf) on targetRef below. Other spec fields (e.g. ttl) may still change.
          description: |
            Resource for importing data to PV, VolumeSnapshot, VirtualDisk, or VirtualDiskSnapshot.
          properties:
            spec:
              type: object
              required:
                - ttl
                - targetRef
              x-kubernetes-validations:
                # Mode B (targetRef.kind == PersistentVolumeClaim): pvcTemplate with a PVC name is mandatory.
                - rule: "self.targetRef.kind != 'PersistentVolumeClaim' || (has(self.targetRef.pvcTemplate) && has(self.targetRef.pvcTemplate.metadata) && has(self.targetRef.pvcTemplate.metadata.name) && size(self.targetRef.pvcTemplate.metadata.name) > 0)"
                  message: "targetRef.pvcTemplate (with metadata.name) is required when targetRef.kind is PersistentVolumeClaim (Mode B, standalone PVC import)."
                # Mode B forbids the Mode A fields (the PVC is fully described by targetRef.pvcTemplate).
                - rule: "self.targetRef.kind != 'PersistentVolumeClaim' || (!has(self.targetRef.group) && !has(self.targetRef.name) && !has(self.storageClassName) && !has(self.size) && !has(self.volumeMode))"
                  message: "when targetRef.kind is PersistentVolumeClaim, targetRef.group/targetRef.name and spec.storageClassName/size/volumeMode must not be set."
                # Mode A (snapshot leaf kind) forbids pvcTemplate.
                - rule: "self.targetRef.kind == 'PersistentVolumeClaim' || !has(self.targetRef.pvcTemplate)"
                  message: "targetRef.pvcTemplate is only allowed when targetRef.kind is PersistentVolumeClaim (Mode A imports a snapshot leaf, not a PVC)."
                # Mode A requires the snapshot-leaf reference and the scratch-PVC volume parameters.
                - rule: "self.targetRef.kind == 'PersistentVolumeClaim' || (has(self.targetRef.group) && has(self.targetRef.name) && has(self.storageClassName) && size(self.storageClassName) > 0 && has(self.size) && size(self.size) > 0)"
                  message: "when targetRef.kind is a snapshot leaf kind (Mode A), targetRef.group, targetRef.name, spec.storageClassName and spec.size are required."
              properties:
                ttl:
                  type: string
                  description: |
                    Time-to-live duration after the last user request.
                    
                    Acceptable values:
                    
                    - `<number>s`
                    - `<number>m`
                    - `<number>h`
                    
                    For example, `5m`, `2h45m`, or `1d`.
                  pattern: '^([0-9]+(\.[0-9]+)?h)?([0-9]+(\.[0-9]+)?m)?([0-9]+s)?$'
                publish:
                  type: boolean
                  description: Expose the importer pod outside the cluster.
                  default: false
                waitForFirstConsumer:
                  type: boolean
                  description: If set to `false`, a load pod is created to trigger volume population when the StorageClass has `volumeBindingMode` set to `WaitForFirstConsumer`.
                  default: true
                storageClassName:
                  type: string
                  description: |
                    Mode A only. StorageClass for the scratch PVC the imported bytes are written into. Its
                    driver must be snapshot-capable (the StorageClass references a VolumeSnapshotClass via the
                    `storage.deckhouse.io/volumesnapshotclass` annotation); the produced durable artifact is
                    always a VolumeSnapshotContent. Provided directly by the caller (mirrored from the source
                    snapshot status), not read from a captured manifest. Must not be set in Mode B.
                size:
                  type: string
                  description: |
                    Mode A only. Requested size of the scratch PVC (a Kubernetes quantity, e.g. `10Gi`).
                    Must not be set in Mode B.
                volumeMode:
                  type: string
                  enum: ["Block", "Filesystem"]
                  description: |
                    Mode A only. Volume mode of the scratch PVC. Defaults to `Filesystem` when omitted. Must
                    not be set in Mode B.
                targetRef:
                  type: object
                  x-kubernetes-validations:
                    # targetRef selects the import target and its mode; it is set once at creation and must
                    # never change afterwards (the DataImport controller and the state-snapshotter
                    # reverse-lookup both assume a stable target for the object's lifetime). Reject any
                    # mutation after creation.
                    - rule: "self == oldSelf"
                      message: "targetRef is immutable"
                  description: |
                    Polymorphic import target. `kind` selects the import mode:
                    
                    - Mode A (snapshot leaf import): `kind` is a snapshot leaf kind (e.g. `VolumeSnapshot`,
                      `VirtualDiskSnapshot`). `group` and `name` identify the namespaced leaf CR (namespace is
                      implicit = the DataImport's own namespace); the scratch-PVC parameters
                      (`spec.storageClassName/size/volumeMode`) describe the volume. This ref exists so the
                      state-snapshotter common controller can reverse-lookup this DataImport from the leaf; the
                      DataImport controller itself does not read the leaf. The produced durable artifact is a
                      VolumeSnapshotContent.
                    - Mode B (standalone PVC import): `kind` is `PersistentVolumeClaim`. `pvcTemplate` fully
                      describes the target PVC the imported bytes are written into; the PVC is preserved after
                      the import. No durable artifact is produced.
                  properties:
                    kind:
                      type: string
                      minLength: 1
                      description: |
                        Import mode selector. `PersistentVolumeClaim` selects Mode B (standalone PVC import via
                        `pvcTemplate`); any other value is treated as a snapshot leaf kind and selects Mode A.
                    group:
                      type: string
                      description: Mode A only. API group of the leaf snapshot resource (e.g. `snapshot.storage.k8s.io`).
                    name:
                      type: string
                      description: Mode A only. Leaf object name.
                    pvcTemplate:
                      type: object
                      description: Mode B only. PersistentVolumeClaim template fully describing the target PVC.
                      properties:
                        metadata:
                          type: object
                          description: PersistentVolumeClaim metadata.
                          properties:
                            name:
                              type: string
                              description: PersistentVolumeClaim name.
                            labels:
                              type: object
                              description: PersistentVolumeClaim labels.
                              additionalProperties:
                                type: string
                            annotations:
                              type: object
                              description: PersistentVolumeClaim annotations.
                              additionalProperties:
                                type: string
                        spec:
                          type: object
                          description: PersistentVolumeClaim specification.
                          properties:
                            accessModes:
                              type: array
                              description: Desired access modes for the volume.
                              items:
                                type: string
                                enum:
                                  [
                                    "ReadWriteOnce",
                                    "ReadOnlyMany",
                                    "ReadWriteMany",
                                    "ReadWriteOncePod",
                                  ]
                            resources:
                              type: object
                              description: Minimum resource requirements for the volume.
                              properties:
                                requests:
                                  type: object
                                  description: Minimum amount of compute resources required.
                                  additionalProperties:
                                    anyOf:
                                      - type: integer
                                      - type: string
                                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                    x-kubernetes-int-or-string: true
                            storageClassName:
                              type: string
                              description: Name of the StorageClass required by the PersistentVolumeClaim.
                            volumeMode:
                              type: string
                              description: Volume mode required by the PersistentVolumeClaim.
                              enum: ["Block", "Filesystem"]
                  required: ["kind"]
            status:
              type: object
              description: DataImport resource status details.
              properties:
                url:
                  type: string
                  description: Internal URL of the importer service.
                ca:
                  type: string
                  description: Base64-encoded CA certificate for establishing a TLS connection to the importer pod.
                publicURL:
                  type: string
                  description: Public URL of the importer service.
                accessTimestamp:
                  type: string
                  format: date-time
                  description: Last access timestamp updated by the importer pod.
                volumeMode:
                  type: string
                  enum: ["Block", "Filesystem"]
                  description: |
                    Volume mode of the exported data.
                dataArtifactRef:
                  type: object
                  description: |
                    Reference to the durable cluster-scoped data artifact produced by this import
                    (a VolumeSnapshotContent). Populated once the backing VolumeCaptureRequest completes.
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                    uid:
                      type: string
                      description: |
                        UID of the durable data artifact (for example the VolumeSnapshotContent UID),
                        making the reference self-contained. Optional; producers fill it best-effort.
                conditions:
                  type: array
                  items:
                    description: Array of conditions describing the current state of the DataImport resource.
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - message
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                        description: Condition type.
                        enum:
                          ["Ready", "Expired", "UploadFinished", "Completed"]
                      status:
                        type: string
                        description: Condition status.
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                        description: Current condition status reason.
                        enum:
                          [
                            "Pending",
                            "PVCCreated",
                            "PodReady",
                            "IngressReady",
                            "Expired",
                            "Deleted",
                            "UploadFinished",
                            "Completed",
                            "PublishFailed",
                            "ValidationFailed",
                            "TargetNotFound",
                            "TargetNotReady",
                            "TargetFailed",
                            "PVConflict",
                            "DeploymentFailed",
                            "CleanupFailed",
                          ]
                      message:
                        description: |-
                          Human-readable message indicating details about the transition.

                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      lastTransitionTime:
                        description: |-
                          Last time the condition transitioned from one status to another.

                          This should be when the underlying condition changed.
                          If the last transition time is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      observedGeneration:
                        description: |-
                          The `.metadata.generation` that the condition was set based upon.

                          For instance, if `.metadata.generation` is currently 12, but the `.status.conditions[x].observedGeneration` is 9, the condition is out of date.
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer

      subresources:
        status: {}
      additionalPrinterColumns:
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Public URL
          type: string
          jsonPath: .status.publicURL
        - name: TTL
          type: string
          jsonPath: .spec.ttl
          priority: 1
        - name: Target Kind
          type: string
          jsonPath: .spec.targetRef.kind
          priority: 1
        - name: Storage Class
          type: string
          jsonPath: .spec.storageClassName
          priority: 1
        - name: Wait For Consumer
          type: boolean
          jsonPath: .spec.waitForFirstConsumer
          priority: 1
        - name: Status
          type: string
          description: The status of the DataImport resource.
          jsonPath: '.status.conditions[?(@.type=="Ready")].reason'
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
