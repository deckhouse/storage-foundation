---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dataexports.storage-foundation.deckhouse.io
  labels:
    heritage: deckhouse
    module: storage-foundation
    backup.deckhouse.io/cluster-config: "true"
spec:
  group: storage-foundation.deckhouse.io
  scope: Namespaced
  names:
    kind: DataExport
    plural: dataexports
    singular: dataexport
    shortNames:
      - de
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          # NOTE: the whole DataExport object is intentionally NOT immutable (previously it was locked with the
          # Deckhouse-only x-kubernetes-immutable extension): only spec.targetRef — the export identity — is
          # locked after creation, via the CEL transition rule (pinning kind/name/group) on the spec node
          # below. The other spec fields (ttl, publish, publicIngress) may still change. This mirrors
          # DataImport, which locks only spec.mode + spec.snapshotRef.
          description: |
            Resource for exporting persistent volume files and blocks.
          properties:
            spec:
              type: object
              required:
                - ttl
                - targetRef
              x-kubernetes-validations:
                # targetRef is the export identity (what is exported): set once at creation and never changed.
                # The other spec fields (ttl, publish, publicIngress) may be updated freely. Compare the
                # identity field-by-field and normalize the optional group (absent == core group == ''): the
                # controller round-trips targetRef through a Go struct whose group is `json:",omitempty"`, so
                # a create that sent group:"" is written back with group omitted. A whole-object
                # self.targetRef == oldSelf.targetRef would wrongly flag that serialization no-op as a
                # mutation and reject the controller's own finalizer/status update, wedging reconciliation.
                - rule: "self.targetRef.kind == oldSelf.targetRef.kind && self.targetRef.name == oldSelf.targetRef.name && (has(self.targetRef.group) ? self.targetRef.group : '') == (has(oldSelf.targetRef.group) ? oldSelf.targetRef.group : '')"
                  message: "spec.targetRef is immutable"
              properties:
                ttl:
                  type: string
                  description: Time-to-live duration after the last user request. Acceptable values - <number>s, <number>m, <number>h, e.g. 5m, 2h45m, 1d
                  pattern: '^([0-9]+(\.[0-9]+)?h)?([0-9]+(\.[0-9]+)?m)?([0-9]+s)?$'
                publish:
                  type: boolean
                  description: |
                    Enable external access to the exporter pod outside the cluster.
                publicIngress:
                  type: string
                  description: |
                    Type of public ingress for external access.
                  enum:
                    - KubernetesAPI
                    - ConsoleFrontend
                targetRef:
                  type: object
                  description: |
                    GroupKind reference to the target resource for export (namespace is implicit =
                    the DataExport's own namespace). Live PersistentVolumeClaim and VirtualDisk are
                    exported directly; any other (snapshot) kind is resolved generically through the
                    leaf's bound SnapshotContent.dataRef and restored via a VolumeRestoreRequest. A bare
                    cluster-scoped VolumeSnapshotContent is rejected.
                  required:
                    - kind
                    - name
                  properties:
                    group:
                      type: string
                      description: |
                        API group of the target resource ("" / omitted for the core group, e.g.
                        for PersistentVolumeClaim).
                    kind:
                      type: string
                      minLength: 1
                      description: |
                        Kind of the target (e.g. PersistentVolumeClaim, VirtualDisk, VolumeSnapshot,
                        VirtualDiskSnapshot).
                    name:
                      type: string
                      minLength: 1
                      description: |
                        Name of the target resource for export.

            status:
              type: object
              description: |
                Status information for the DataExport resource.
              properties:
                url:
                  type: string
                  description: |
                    Internal URL of the exporter pod (e.g., https://X.X.X.X:8085).
                ca:
                  type: string
                  description: |
                    Base64 encoded CA certificate for TLS connection to the exporter pod.
                publicURL:
                  type: string
                  description: |
                    Public URL for external access (e.g., https://data-exporter.<public-domain>/<namespace>/<DataExport-name>).
                accessTimestamp:
                  type: string
                  format: date-time
                  description: |
                    Timestamp of the last access to the exported data.
                volumeMode:
                  type: string
                  enum: ["Block", "Filesystem"]
                  description: |
                    Volume mode of the exported data.
                phase:
                  type: string
                  enum: ["Pending", "Ready", "Expired", "Failed", "Terminating"]
                  description: |
                    Coarse-grained lifecycle state, written exclusively by the controller:
                    Pending → Ready → Expired | Failed (a DataExport has no Completed phase). `Terminating`
                    denotes an object with a deletion timestamp and is a transient state, not an outcome.
                    `Expired` is a normal terminal outcome (the idle-TTL window elapsed), not a failure.
                completionTimestamp:
                  type: string
                  format: date-time
                  description: |
                    Time the DataExport reached a terminal phase (Expired or Failed). Set once by the
                    controller; the garbage collector measures retention age from this timestamp.
                serverState:
                  type: string
                  enum: ["Ready", "IdleExpired"]
                  description: |
                    Raw progress signal reported by the exporter server pod (the only writer): `Ready` when
                    the server is serving, `IdleExpired` when the idle-TTL window elapsed. The controller
                    derives phase and conditions from it.
                conditions:
                  type: array
                  description: |
                    Array of conditions describing the current state of the DataExport resource.
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - message
                      - observedGeneration
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                        description: |
                          Type of the condition.
                        enum: ["Ready"]
                      status:
                        type: string
                        description: |
                          Status of the condition.
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                        description: |
                          Reason for the current condition status.
                        enum:
                          [
                            "Pending",
                            "ServerReady",
                            "ValidationFailed",
                            "TargetNotReady",
                            "TargetNotFound",
                            "PVConflict",
                            "DeploymentFailed",
                            "CleanupFailed",
                            "PublishFailed",
                            "Expired"
                          ]
                      message:
                        type: string
                        description: |
                          Message describing the condition.
                      lastTransitionTime:
                        type: string
                        format: date-time
                        description: |
                          Last time the condition transitioned from one status to another.
                      observedGeneration:
                        type: integer
                        description: |
                          Observed generation of the resource when the condition was last updated.

      subresources:
        status: {}
        download: {}
      additionalPrinterColumns:
        - name: URL
          type: string
          jsonPath: .status.url
        - name: Public URL
          type: string
          jsonPath: .status.publicURL
        - name: TTL
          type: string
          jsonPath: .spec.ttl
          priority: 1
        - name: Target Kind
          type: string
          jsonPath: .spec.targetRef.kind
          priority: 1
        - name: Target Name
          type: string
          jsonPath: .spec.targetRef.name
          priority: 1
        - name: Status
          type: string
          description: The status of the DataExport resource.
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
