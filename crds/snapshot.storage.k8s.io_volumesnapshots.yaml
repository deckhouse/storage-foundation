---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
    api-approved.kubernetes.io: "https://github.com/kubernetes-csi/external-snapshotter/pull/814"
  name: volumesnapshots.snapshot.storage.k8s.io
  labels:
    heritage: deckhouse
    module: storage-foundation
spec:
  group: snapshot.storage.k8s.io
  names:
    kind: VolumeSnapshot
    listKind: VolumeSnapshotList
    plural: volumesnapshots
    shortNames:
    - vs
    singular: volumesnapshot
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Indicates if the snapshot is ready to be used to restore a volume.
      jsonPath: .status.readyToUse
      name: ReadyToUse
      type: boolean
    - description: If a new snapshot needs to be created, this contains the name of
        the source PVC from which this snapshot was (or will be) created.
      jsonPath: .spec.source.persistentVolumeClaimName
      name: SourcePVC
      type: string
    - description: If a snapshot already exists, this contains the name of the existing
        VolumeSnapshotContent object representing the existing snapshot.
      jsonPath: .spec.source.volumeSnapshotContentName
      name: SourceSnapshotContent
      type: string
    - description: Represents the minimum size of volume required to rehydrate from
        this snapshot.
      jsonPath: .status.restoreSize
      name: RestoreSize
      type: string
    - description: The name of the VolumeSnapshotClass requested by the VolumeSnapshot.
      jsonPath: .spec.volumeSnapshotClassName
      name: SnapshotClass
      type: string
    - description: Name of the VolumeSnapshotContent object to which the VolumeSnapshot
        object intends to bind to. Please note that verification of binding actually
        requires checking both VolumeSnapshot and VolumeSnapshotContent to ensure
        both are pointing at each other. Binding **must** be verified prior to usage of
        this object.
      jsonPath: .status.boundVolumeSnapshotContentName
      name: SnapshotContent
      type: string
    - description: Timestamp when the point-in-time snapshot was taken by the underlying
        storage system.
      jsonPath: .status.creationTime
      name: CreationTime
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          VolumeSnapshot is a user's request for either creating a point-in-time
          snapshot of a persistent volume, or binding to a pre-existing snapshot.
        properties:
          apiVersion:
            description: |-
              API version of this object representation. Servers convert recognized schemas
              to the latest internal value and may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind of REST resource this object represents. Servers may infer this value
              from the endpoint the client submits requests to. Cannot be updated
              after creation. Value must be in CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Desired characteristics of a snapshot requested by a user.
              More info: https://kubernetes.io/docs/concepts/storage/volume-snapshots#volumesnapshots
            properties:
              mode:
                default: Capture
                description: |-
                  mode selects how this VolumeSnapshot obtains its content and is immutable once set.
                  Capture (default): dynamic CSI snapshot from spec.source. Import: the data artifact is
                  produced by a DataImport in the same namespace (reverse-lookup by DataImport.spec.snapshotRef);
                  spec.source is omitted (required only when mode != Import) and the upstream
                  snapshot-controller does not reconcile such a VolumeSnapshot - the state-snapshotter
                  common controller binds it (sets status).
                  Deckhouse extension: parity with spec.mode on every other state-snapshotter snapshot kind.
                enum:
                - Capture
                - Import
                type: string
                x-kubernetes-validations:
                - message: mode is immutable
                  rule: self == oldSelf
              source:
                description: |-
                  source specifies where a snapshot will be created from.
                  Required unless mode is Import (an import VolumeSnapshot omits it - the data artifact
                  comes from a DataImport; symmetry with the other snapshot kinds).
                  May be empty: restore intent (backup controller sets volumeSnapshotContentName after restore).
                  Otherwise exactly one of persistentVolumeClaimName or volumeSnapshotContentName must be set.
                  Immutable after creation (except one-shot set of volumeSnapshotContentName from empty).
                properties:
                  persistentVolumeClaimName:
                    description: |-
                      Name of the PersistentVolumeClaim object representing the volume
                      from which a snapshot should be created.
                      PVC must be in the same namespace as the VolumeSnapshot object.
                      Specified if the snapshot does not exist and needs to be created.
                      Immutable.
                    type: string
                    x-kubernetes-validations:
                    - message: persistentVolumeClaimName is immutable
                      rule: self == oldSelf
                  volumeSnapshotContentName:
                    description: |-
                      volumeSnapshotContentName specifies the name of a pre-existing VolumeSnapshotContent
                      object representing an existing volume snapshot.
                      This field should be set if the snapshot already exists and only needs a representation in Kubernetes.
                      For restore intent, backup controller may set this once from empty after successful restore (one-shot update).
                    type: string
                    x-kubernetes-validations:
                    # Immutable except one-shot set from empty (restore controller sets after successful restore)
                    - message: volumeSnapshotContentName is immutable once set
                      rule: size(oldSelf) == 0 || self == oldSelf
                type: object
                x-kubernetes-validations:
                - message: persistentVolumeClaimName is required once set
                  rule: '!has(oldSelf.persistentVolumeClaimName) || has(self.persistentVolumeClaimName)'
                - message: volumeSnapshotContentName is required once set
                  rule: '!has(oldSelf.volumeSnapshotContentName) || has(self.volumeSnapshotContentName)'
                # Allow empty source (restore intent / import mode) or at most one of persistentVolumeClaimName, volumeSnapshotContentName
                - message: source must be empty (restore intent / import mode) or exactly one of persistentVolumeClaimName and volumeSnapshotContentName must be set
                  rule: >-
                    [has(self.persistentVolumeClaimName), has(self.volumeSnapshotContentName)].filter(x, x).size() <= 1
              volumeSnapshotClassName:
                description: |-
                  Name of the VolumeSnapshotClass requested by the VolumeSnapshot.
                  May be empty to use the default SnapshotClass.
                  A cluster may have multiple default Volume SnapshotClasses: one
                  per CSI Driver. If a SnapshotClass is not specified,
                  VolumeSnapshotSource is checked to determine the associated
                  CSI Driver, and the default VolumeSnapshotClass for that
                  CSI Driver is used. If multiple VolumeSnapshotClasses exist for
                  a CSI Driver and more than one is marked as default,
                  CreateSnapshot fails and generates an event.
                  Empty string is not allowed.
                type: string
                x-kubernetes-validations:
                - message: volumeSnapshotClassName must not be the empty string when
                    set
                  rule: size(self) > 0
            type: object
            x-kubernetes-validations:
            # Symmetry with every other snapshot kind: source is a Capture-family concern. An import
            # VolumeSnapshot omits it entirely (the data artifact comes from a DataImport); everything
            # else (dynamic capture, pre-provisioned, restore intent with an empty source) must carry it.
            - message: source is required unless mode is Import
              rule: >-
                (has(self.mode) && self.mode == 'Import') || has(self.source)
            # Import mode carries no CSI source: absent entirely, or empty if a typed client serialized it.
            - message: an import-mode VolumeSnapshot (mode = Import) must have no CSI source
              rule: >-
                !has(self.mode) || self.mode != 'Import' || !has(self.source) || (!has(self.source.persistentVolumeClaimName) && !has(self.source.volumeSnapshotContentName))
          status:
            description: |-
              Current information of a snapshot.
              Before using this object, verify that binding between VolumeSnapshot and
              VolumeSnapshotContent objects is successful by ensuring both
              objects point at each other.
            properties:
              boundSnapshotContentName:
                description: |-
                  Name of the cluster-scoped state-snapshotter SnapshotContent (state-snapshotter.deckhouse.io)
                  that backs this VolumeSnapshot as a logical node in a snapshot tree. Written by the
                  state-snapshotter common controller in addition to boundVolumeSnapshotContentName.
                  Deckhouse extension.
                type: string
              boundVolumeSnapshotContentName:
                description: |-
                  Name of the VolumeSnapshotContent object to which this VolumeSnapshot
                  object is bound.
                  If not specified, the VolumeSnapshot object has not been
                  successfully bound to a VolumeSnapshotContent object yet.
                  **Note:** To prevent security issues, verify that binding between
                  VolumeSnapshot and VolumeSnapshotContent objects is successful by ensuring
                  both objects point at each other before using this object.
                type: string
              captureState:
                description: |-
                  captureState collects the state-snapshotter capture signals mirrored onto this VolumeSnapshot
                  when it is a domain snapshot node: commonController holds the core-written capture-leg latches,
                  and domainSpecificController holds the domain-written planning refs and lifecycle. Written by the
                  state-snapshotter controllers. Deckhouse extension.
                properties:
                  commonController:
                    description: 'commonController holds the core-written capture-leg
                      success latches. Single writer: state-snapshotter core.'
                    properties:
                      dataCaptured:
                        description: |-
                          dataCaptured is the data-leg success latch, declared only where a data line exists.
                        type: boolean
                      manifestCaptured:
                        description: |-
                          manifestCaptured is the manifest-leg success latch (declared on every capture node).
                        type: boolean
                      subtreeManifestsPersisted:
                        description: |-
                          subtreeManifestsPersisted is a core-written mirror of the bound SnapshotContent's recursive
                          "this node and all descendants archived their manifests" latch. Monotonic (false -> true).
                        type: boolean
                      subtreePlanned:
                        description: |-
                          subtreePlanned is a core-computed monotonic recursive latch: true once this node reached
                          capture barrier 1 (domainSpecificController.phase >= Planned) and every direct child's own
                          subtreePlanned is true (the whole subtree finished planning). Domains only read it.
                          Monotonic (false -> true).
                        type: boolean
                    type: object
                  domainSpecificController:
                    description: 'domainSpecificController holds the domain-written
                      planning refs and lifecycle. Single writer: domain (SDK).'
                    properties:
                      excludedRefs:
                        description: |-
                          excludedRefs are the domain's direct exclusion vetoes at this node (the source objects it
                          dropped via the exclude label while enumerating its children).
                        items:
                          description: |-
                            An excluded source object reference ({apiVersion,kind,name}); namespace is implicit
                            (the snapshot's namespace).
                          properties:
                            apiVersion:
                              type: string
                            kind:
                              type: string
                            name:
                              type: string
                          required:
                          - apiVersion
                          - kind
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      manifestCaptureRequestName:
                        description: manifestCaptureRequestName is the temporary MCR
                          owned by the domain node while own-scope capture runs.
                        type: string
                      message:
                        description: message is a human-readable detail for phase=Failed.
                        type: string
                      phase:
                        description: phase is the domain lifecycle barrier (Planning|Planned|Finished|Failed).
                        enum:
                        - Planning
                        - Planned
                        - Finished
                        - Failed
                        type: string
                      reason:
                        description: reason is a short, machine-readable reason for
                          phase=Failed (free-form domain string).
                        type: string
                      volumeCaptureRequestName:
                        description: volumeCaptureRequestName is the temporary VCR
                          owned by a data-leaf domain node while the data leg runs.
                        type: string
                    type: object
                type: object
              childrenSnapshotRefs:
                description: |-
                  childrenSnapshotRefs are the direct child snapshot edges when this VolumeSnapshot participates
                  in a snapshot tree. A VolumeSnapshot is a data leaf, so this is normally empty; kept for
                  uniformity across snapshot kinds. Deckhouse extension.
                items:
                  description: |-
                    A child snapshot object reference ({apiVersion,kind,name}) in the run tree; namespace is
                    implicit (the parent Snapshot's namespace).
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - apiVersion
                - kind
                - name
                x-kubernetes-list-type: map
              conditions:
                description: |-
                  conditions report the state-snapshotter protocol readiness (conditions[Ready] is the single
                  user-facing condition derived by the core), distinct from the CSI readyToUse binding signal.
                  Written by the state-snapshotter core. Deckhouse extension.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              creationTime:
                description: |-
                  Timestamp when the point-in-time snapshot is taken by the underlying
                  storage system.
                  For dynamic snapshot creation, filled by the
                  snapshot controller with the `creation_time` value returned from CSI
                  `CreateSnapshot` gRPC call.
                  For a pre-existing snapshot, filled with the `creation_time`
                  value returned from the CSI `ListSnapshots` gRPC call if the driver supports it.
                  If not specified, the creation time of the snapshot is unknown.
                format: date-time
                type: string
              data:
                description: |-
                  data is the self-contained data binding (source + artifact + volume metadata)
                  mirrored from the backing state-snapshotter SnapshotContent.status.data, so d8
                  resolves the captured-volume descriptor from this namespaced VolumeSnapshot
                  alone. Written by the state-snapshotter common controller. Deckhouse extension.
                properties:
                  accessModes:
                    description: Source PVC access modes (e.g. ReadWriteOnce).
                    items:
                      type: string
                    type: array
                  artifact:
                    description: Durable data artifact (a VolumeSnapshotContent).
                    properties:
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      name:
                        type: string
                      uid:
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                  fsType:
                    description: Source filesystem type (Filesystem volumes only).
                    type: string
                  size:
                    description: Real allocated size of the captured volume (e.g. "10Gi").
                    type: string
                  source:
                    description: Captured PersistentVolumeClaim source (uid is the volume identity).
                    properties:
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      name:
                        type: string
                      namespace:
                        type: string
                      uid:
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                  storageClassName:
                    description: Source StorageClass of the captured volume.
                    type: string
                  volumeMode:
                    description: Source volume mode (Block or Filesystem).
                    enum:
                    - Block
                    - Filesystem
                    type: string
                required:
                - artifact
                - source
                type: object
              error:
                description: |-
                  Last observed error during snapshot creation, if any.
                  Useful to upper level controllers (i.e., application controller)
                  to decide whether to continue waiting for the snapshot to be created
                  based on the error type.
                  The snapshot controller keeps retrying when an error occurs during
                  snapshot creation. Upon success, the field is cleared.
                properties:
                  message:
                    description: |-
                      Details of the encountered error during snapshot creation
                      if specified.
                      **Note:** message may be logged, and it should not contain sensitive
                      information.
                    type: string
                  time:
                    description: |-
                      Timestamp when the error was encountered.
                    format: date-time
                    type: string
                type: object
              readyToUse:
                description: |-
                  Indicates if the snapshot is ready to be used to restore a volume.
                  For dynamic snapshot creation, filled by the
                  snapshot controller with the `ready_to_use` value returned from CSI
                  `CreateSnapshot` gRPC call.
                  For a pre-existing snapshot, filled with the `ready_to_use`
                  value returned from the CSI `ListSnapshots` gRPC call if the driver supports it,
                  otherwise set to `True`.
                  If not specified, the readiness of a snapshot is unknown.
                type: boolean
              restoreSize:
                type: string
                description: |-
                  Minimum size of volume required to create a volume from this snapshot.
                  For dynamic snapshot creation, filled by the
                  snapshot controller with the `size_bytes` value returned from CSI
                  `CreateSnapshot` gRPC call.
                  For a pre-existing snapshot, filled with the `size_bytes`
                  value returned from the CSI `ListSnapshots` gRPC call if the driver supports it.
                  When restoring a volume from this snapshot, the volume size **must not**
                  be smaller than the `restoreSize` if specified, otherwise the restoration will fail.
                  If not specified, the size is unknown.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              sourceRef:
                description: |-
                  sourceRef is the full reference to the captured live source object (the source PVC),
                  written by the state-snapshotter domain controller (PublishSnapshotSource). Self-contained for
                  import-mode recreation. Deckhouse extension.
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    description: Namespace of the source object (namespaced sources
                      only).
                    type: string
                  uid:
                    description: UID of the captured live source object (best-effort;
                      used by d8-cli for import-mode recreation).
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              volumeGroupSnapshotName:
                description: |-
                  Name of the VolumeGroupSnapshot of which this VolumeSnapshot is a part.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
  - additionalPrinterColumns:
    - description: Indicates if the snapshot is ready to be used to restore a volume.
      jsonPath: .status.readyToUse
      name: ReadyToUse
      type: boolean
    - description: If a new snapshot needs to be created, this contains the name of the source PVC from which this snapshot was (or will be) created.
      jsonPath: .spec.source.persistentVolumeClaimName
      name: SourcePVC
      type: string
    - description: If a snapshot already exists, this contains the name of the existing VolumeSnapshotContent object representing the existing snapshot.
      jsonPath: .spec.source.volumeSnapshotContentName
      name: SourceSnapshotContent
      type: string
    - description: Represents the minimum size of volume required to rehydrate from this snapshot.
      jsonPath: .status.restoreSize
      name: RestoreSize
      type: string
    - description: The name of the VolumeSnapshotClass requested by the VolumeSnapshot.
      jsonPath: .spec.volumeSnapshotClassName
      name: SnapshotClass
      type: string
    - description: Name of the VolumeSnapshotContent object to which the VolumeSnapshot object intends to bind to. Please note that verification of binding actually requires checking both VolumeSnapshot and VolumeSnapshotContent to ensure both are pointing at each other. Binding **must** be verified prior to usage of this object.
      jsonPath: .status.boundVolumeSnapshotContentName
      name: SnapshotContent
      type: string
    - description: Timestamp when the point-in-time snapshot was taken by the underlying storage system.
      jsonPath: .status.creationTime
      name: CreationTime
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
