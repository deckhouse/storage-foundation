spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Ресурс для импорта данных в PV, VolumeSnapshot, VirtualDisk или VirtualDiskSnapshot.
          properties:
            spec:
              properties:
                ttl:
                  description: |
                    Время жизни после последнего запроса пользователя.

                    Допустимые значения:

                    - `<number>s`;
                    - `<number>m`;
                    - `<number>h`.

                    Например, `5m`, `2h45m`, или `1d`.
                publish:
                  description: |
                    Включение внешнего доступа к импортер-поду за пределами кластера.
                waitForFirstConsumer:
                  description: |
                    Если параметр установлен в `false`, создаётся load-под для запуска процесса заполнения тома, когда в StorageClass для параметра `volumeBindingMode` задано значение `WaitForFirstConsumer`.
                mode:
                  description: |
                    Дискриминатор, определяющий, что импорт делает с данными:

                    - `CreatePVC`: запись в сохраняемый, создаваемый PVC (`pvcTemplate`). Долговечный артефакт не создаётся.
                    - `PopulateData`: данные заливаются во временный (scratch) том (`storageParams`) и захватываются в долговечный VolumeSnapshotContent для уже существующего узла-снимка, указанного в `snapshotRef`.
                snapshotRef:
                  description: |
                    Только для режима PopulateData. Ссылка на уже существующий узел xxxSnapshot, которому принадлежит создаваемый долговечный артефакт (пространство имён неявно совпадает с пространством имён DataImport). Проставляется внешним создателем (d8/пользователь/система резервного копирования); контроллер DataImport её не читает — она нужна, чтобы обратный поиск state-snapshotter сопоставил лист по `spec.snapshotRef`.
                  properties:
                    apiVersion:
                      description: |
                        Группа/версия узла-снимка (например, `snapshot.storage.k8s.io/v1`).
                    kind:
                      description: |
                        Вид узла-снимка (например, `VolumeSnapshot`, `VirtualDiskSnapshot`).
                    name:
                      description: |
                        Имя узла-снимка.
                storageParams:
                  description: |
                    Только для режима PopulateData. Параметры временного (scratch) тома, в который заливаются импортируемые данные до захвата; уничтожается после создания долговечного VolumeSnapshotContent. Его StorageClass должен поддерживать снимки (ссылается на VolumeSnapshotClass через аннотацию `storage.deckhouse.io/volumesnapshotclass`).
                  properties:
                    storageClassName:
                      description: |
                        StorageClass временного (scratch) PVC (должен поддерживать снимки).
                    size:
                      description: |
                        Запрашиваемый размер временного (scratch) PVC (величина Kubernetes, например `10Gi`).
                    volumeMode:
                      description: |
                        Режим тома временного (scratch) PVC. По умолчанию `Filesystem`.
                pvcTemplate:
                  description: |
                    Только для режима CreatePVC. Шаблон PersistentVolumeClaim, полностью описывающий целевой PVC, в который записываются импортируемые данные; PVC сохраняется после импорта.
                  properties:
                    metadata:
                      description: |
                        Метаданные PersistentVolumeClaim.
                      properties:
                        name:
                          description: |
                            Имя PersistentVolumeClaim.
                        labels:
                          description: |
                            Метки PersistentVolumeClaim.
                        annotations:
                          description: |
                            Аннотации PersistentVolumeClaim.
                    spec:
                      description: |
                        Спецификация PersistentVolumeClaim.
                      properties:
                        accessModes:
                          description: |
                            Желаемые режимы доступа к тому.
                        resources:
                          description: |
                            Минимальные требования к ресурсам тома.
                          properties:
                            requests:
                              description: |
                                Минимальный объём требуемых вычислительных ресурсов.
                        storageClassName:
                          description: |
                            Имя StorageClass, требуемого для PersistentVolumeClaim.
                        volumeMode:
                          description: |
                            Режим тома, требуемый для PersistentVolumeClaim.
            status:
              description: |
                Информация о статусе ресурса DataImport.
              properties:
                url:
                  description: |
                    Внутренний URL-адрес сервиса импортера.
                ca:
                  description: |
                    CA-сертификат в кодировке Base64 для TLS-соединения с импортер-подом.
                publicURL:
                  description: |
                    Публичный URL-адрес сервиса импортера.
                accessTimestamp:
                  description: |
                    Временная метка последнего доступа, обновляемая импортер-подом.
                volumeMode:
                  description: |
                    Режим тома импортированных данных.
                phase:
                  description: |
                    Укрупнённое состояние жизненного цикла, которое пишет только контроллер:
                    Pending → Ready → Completed | Expired | Failed. Значение `Terminating` означает объект с
                    установленной меткой удаления и является переходным состоянием, а не исходом. `Expired` —
                    штатный терминальный исход (истекло окно неактивности), а не сбой.
                completionTimestamp:
                  description: |
                    Время перехода DataImport в терминальную фазу (Completed, Expired или Failed).
                    Проставляется контроллером один раз; сборщик мусора отсчитывает время хранения от этой метки.
                serverState:
                  description: |
                    Необработанный сигнал прогресса от импортер-пода (единственного писателя): `Ready` — сервер
                    обслуживает запросы, `Finished` — заливка клиента завершена долговечно, `IdleExpired` —
                    истекло окно неактивности. Контроллер выводит из него фазу и условия.
                data:
                  description: |
                    Блок захваченных данных импорта. Содержит долговечный кластерный артефакт данных под data.artifactRef (VolumeSnapshotContent). Заполняется после завершения соответствующего VolumeCaptureRequest.
                  properties:
                    artifactRef:
                      description: |
                        Ссылка на долговечный кластерный артефакт данных (VolumeSnapshotContent), созданный этим импортом.
                      properties:
                        apiVersion:
                          description: |
                            Версия API артефакта данных.
                        kind:
                          description: |
                            Тип артефакта данных.
                        name:
                          description: |
                            Имя артефакта данных.
                        uid:
                          description: |
                            UID артефакта данных (например, UID VolumeSnapshotContent). Необязательное; заполняется по возможности.
                conditions:
                  type: array
                  items:
                    type: object
                    description: Массив условий, описывающих текущее состояние ресурса DataImport.
                    properties:
                      type:
                        description: |
                          Тип условия.
                      status:
                        description: |
                          Статус условия.
                      reason:
                        description: |
                          Причина текущего статуса условия.
                      message:
                        description: |
                          Человекочитаемое сообщение с подробностями о переходе статуса.

                          Может быть пустой строкой.
                      lastTransitionTime:
                        description: |
                          Время последнего перехода условия из одного статуса в другой.

                          Обычно соответствует моменту изменения базового условия.
                          Если время последнего перехода неизвестно, допускается использование времени изменения поля API.
                      observedGeneration:
                        description: |
                          Значение `.metadata.generation`, на основе которого было установлено условие.

                          Например, если текущее значение `.metadata.generation` равно 12, а `.status.conditions[x].observedGeneration` равно 9, то статус условия не соответствует текущему состоянию ресурса.
