---
# do not remove this image: used in external audits (DKP CSE)
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
from: {{ index $.Images "builder/src" }}
final: false

git:
  - add: {{ .ModuleDir }}
    to: /src
    includePaths:
      - images/{{ $.ImageName }}
    stageDependencies:
      install:
        - '**/*'
    excludePaths:
      - images/{{ $.ImageName }}/werf.inc.yaml

secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}

shell:
  install:
    - git clone --depth 1 --branch {{ include "get_oss_version_by_id" (list $.ImageName .) }} $(cat /run/secrets/SOURCE_REPO)/kubernetes-csi/external-snapshotter.git /src/snapshot-controller
    - cd /src/snapshot-controller
    - for patchfile in /src/images/{{ $.ImageName }}/patches/*.patch; do echo "Apply ${patchfile} ... "; git apply ${patchfile} --verbose; done
    - rm -rf /src/images/{{ $.ImageName }}/patches
    - rm -rf /src/snapshot-controller/vendor
    - rm -rf /src/snapshot-controller/.git

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
from: {{ index $.Images (eq .SVACE_ENABLED "false" | ternary "builder/golang" "builder/alpine-svace") }}
final: false

import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
    add: /src
    to: /src
    before: install

mount:
{{ include "mount points for golang builds" . }}

secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}

shell:
  install:
    {{- if eq .SVACE_ENABLED "false" }}
    - pm install git make bash
    {{- else }}
    {{- include "alpine packages proxy" $ | nindent 4 }}
    - apk add --no-cache make bash git
    {{- end }}
    - cd /src/snapshot-controller
    - export CGO_ENABLED=0 GOOS=linux GOARCH=amd64
    - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
    # Rebuild the vendor dir against the patched go.mod (the src stage removed
    # the committed vendor tree; 004 bumps golang.org/x/* for CVEs). The
    # dataimport fork changes in ./client (go.mod replace target) are preserved
    # by go mod vendor; the vsc-only patch touches pkg/ only.
    - GOPROXY=$(cat /run/secrets/GOPROXY) go mod vendor
    - |
      {{- include "image-build.build" (set $ "BuildCommand" (printf "make build")) | nindent 6 }}
    - cp bin/snapshot-controller bin/csi-snapshotter /
    - chown 64535:64535 /snapshot-controller /csi-snapshotter
    - chmod 0755 /snapshot-controller /csi-snapshotter

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
from: {{ index $.Images "builder/distroless" }}
import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
    add: /{{ $.ImageName }}
    to: /{{ $.ImageName }}
    before: setup

imageSpec:
  config:
    entrypoint: ["/{{ $.ImageName }}"]

{{- /*
Attach an OpenVEX attestation to the snapshot-controller image so trivy
suppresses the unfixable golang.org/x/crypto/openpgp advisory (GO-2026-5932)
reported against the snapshot-controller binary. Predicate:
/images/snapshot-controller/known_vulnerabilities.vex (per the "vex mitigation" template).
*/ -}}
{{- include "vex mitigation" (list $ $.ImageName) }}
