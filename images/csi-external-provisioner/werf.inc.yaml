# Based on https://github.com/kubernetes-csi/external-provisioner/blob/master/Dockerfile
{{- range $key, $rawVer := index $.k8sVersions $.ImageName }}
  {{- $version := toString $key }}
  {{- $src_version := toString $rawVer }}
  {{- $patches := (printf "/images/%s" $.ImageName) }}
  {{- $patch := false }}
  {{- range $path, $_ := $.Files.Glob (printf "%s/*" $patches) }}
    {{- if contains $src_version $path }}
      {{- $patch = true }}
    {{- end }}
  {{- end }}
---
image: {{ $.ModuleNamePrefix }}{{ $.ImageName }}-ForK8SGE-{{ $version | replace "." "-" }}
from: {{ index $.Images "builder/distroless" }}
import:
- image: {{ $.ModuleNamePrefix }}{{ $.ImageName }}-artifact-{{ $version | replace "." "-" }}
  add: /csi-provisioner
  to: /csi-provisioner
  before: setup
git:
{{- include "image mount points" $ }}
imageSpec:
  config:
    entrypoint: ["/csi-provisioner"]
---
image: {{ $.ModuleNamePrefix }}{{ $.ImageName }}-src-artifact-{{ $version | replace "." "-" }}
from: {{ index $.Images "builder/src" }}
final: false
    {{- if $patch }}
git:
- add: {{ $patches }}/patches/{{ $src_version }}
  to: /patches
  stageDependencies:
    install:
    - '**/*'
    {{- end }}
secrets:
- id: SOURCE_REPO
  value: {{ $.SOURCE_REPO }}
shell:
  install:
  - cd /src
  # DEBUG (temporary): confirm which ref/commit/go.mod werf actually clones.
  - 'echo "=== external-provisioner src_version: {{ $src_version }} ==="'
  - git clone --depth 1 --branch {{ $src_version }} $(cat /run/secrets/SOURCE_REPO)/kubernetes-csi/external-provisioner.git .
  - echo "=== cloned HEAD ==="
  - git rev-parse HEAD
  - echo "=== cloned  branch ==="
  - git branch --show-current || true
  - echo "=== cloned go.mod ==="
  - grep -nE '^(go|toolchain) ' go.mod
  {{- if $patch }}
  - git apply /patches/*.patch --verbose
  {{- end }}
  - rm -rf vendor
  - rm -rf .git
---
image: {{ $.ModuleNamePrefix }}{{ $.ImageName }}-artifact-{{ $version | replace "." "-" }}
from: {{ index $.Images (eq $.SVACE_ENABLED "false" | ternary "builder/golang" "builder/alpine-svace") }}
final: false
mount:
{{ include "mount points for golang builds" $ }}
import:
- image: {{ $.ModuleNamePrefix }}{{ $.ImageName }}-src-artifact-{{ $version | replace "." "-" }}
  add: /src
  to: /src
  before: install
secrets:
- id: GOPROXY
  value: {{ $.GOPROXY }}
shell:
  install:
    {{- if eq $.SVACE_ENABLED "false" }}
    - pm install git make bash
    {{- else }}
    {{- include "alpine packages proxy" $ | nindent 4 }}
    - apk add --no-cache make bash git
    {{- end }}
    - export GO_VERSION=${GOLANG_VERSION} CGO_ENABLED=0 GOOS=linux GOARCH=amd64
    - cd /src
    # DEBUG (temporary): show the go.mod that actually reached the build stage.
    - echo "=== /src go.mod before download ==="
    - grep -nE '^(go|toolchain) ' go.mod
    - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
    - go mod vendor
    - make build
    - cp bin/csi-provisioner /csi-provisioner
    - chown 64535:64535 /csi-provisioner
    - chmod 0755 /csi-provisioner

{{- /*
Attach an OpenVEX attestation to each published csi-provisioner image
({{ $.ImageName }}-ForK8SGE-<k8s>) so trivy suppresses the unfixable
golang.org/x/crypto/openpgp advisory (GO-2026-5932) reported against the
csi-provisioner binary. Predicate:
/images/csi-external-provisioner/known_vulnerabilities.vex (per the "vex mitigation" template).
*/ -}}
{{- include "vex mitigation" (list $ (printf "%s%s-ForK8SGE-%s" $.ModuleNamePrefix $.ImageName ($version | replace "." "-"))) }}
{{- end }}
