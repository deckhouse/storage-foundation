# Registers the CSI VolumeSnapshot as a state-snapshotter DOMAIN snapshot kind (design §11.1/§11.3, wave8
# Block 3c). The CustomSnapshotDefinition tells the state-snapshotter core that:
#   - a source PersistentVolumeClaim (v1) is materialized by a VolumeSnapshot (snapshot.storage.k8s.io/v1);
#   - the kind carries a volume data leg (requiresDataArtifact: true) — the native CSI VolumeSnapshotContent.
# Registration is what turns a module-managed VolumeSnapshot into a domain-captured object (CSD-implies-
# domain-capture): the core then owns its SnapshotContent shell and mirrors Ready, while the
# storage-foundation VolumeSnapshot domain controller plans the manifest leg via the snapshot SDK.
#
# The CustomSnapshotDefinition and ManifestCaptureRequest CRDs are provided by the state-snapshotter module,
# which module.yaml requires (modules.state-snapshotter >= 0.0.0), guaranteeing CRD-before-CR ordering.
apiVersion: state-snapshotter.deckhouse.io/v1alpha1
kind: CustomSnapshotDefinition
metadata:
  name: storage-foundation-volumesnapshot
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
spec:
  # Weight orders universal traversal across snapshot kinds by ascending value. VolumeSnapshot is a data
  # leaf; a mid-range weight keeps it after coarser aggregate kinds without pinning it to either extreme.
  weight: 100
  apiVersion: snapshot.storage.k8s.io/v1
  kind: VolumeSnapshot
  requiresDataArtifact: true
  source:
    apiVersion: v1
    kind: PersistentVolumeClaim
