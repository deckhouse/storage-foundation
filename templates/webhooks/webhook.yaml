---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: "d8-{{ .Chart.Name }}-volume-snapshot-mutation"
  labels:
    heritage: deckhouse
    module: storage-foundation
webhooks:
  - name: "d8-{{ .Chart.Name }}-volume-snapshot-mutation.storage-foundation.deckhouse.io"
    failurePolicy: Fail
    rules:
      - apiGroups: ["snapshot.storage.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["volumesnapshots"]
        scope: "Namespaced"
    # The mutator only defaults spec.volumeSnapshotClassName from the source PVC's StorageClass, so it is
    # meaningful only for PVC-source VolumeSnapshots. Restrict invocation to them: the mutator decodes the
    # object into the upstream typed VolumeSnapshot (which lacks Deckhouse extension fields such as
    # spec.source.import), and kubewebhook computes the patch as a diff against that re-serialized
    # typed object — so firing on a non-PVC-source VS (import-mode spec.source.import marker, or pre-provisioned
    # volumeSnapshotContentName) would silently strip those extension fields. Scoping to PVC source both
    # matches the mutator's only purpose and prevents that data loss.
    matchConditions:
      - name: only-pvc-source-volumesnapshots
        expression: "has(object.spec.source) && has(object.spec.source.persistentVolumeClaimName)"
    clientConfig:
      service:
        namespace: "d8-{{ .Chart.Name }}"
        name: "webhooks"
        path: "/volume-snapshot-mutate"
      caBundle: {{ .Values.storageFoundation.internal.customWebhookCert.ca | b64enc | quote }}
    admissionReviewVersions: ["v1", "v1beta1"]
    sideEffects: None
    timeoutSeconds: 10
