apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    heritage: deckhouse
    module: storage-foundation
    rbac.deckhouse.io/aggregate-to-storage-as: viewer
    rbac.deckhouse.io/kind: use
  name: d8:use:capability:storage-foundation:view_resources
rules:
  - apiGroups:
      - storage.deckhouse.io
    resources:
      - volumecapturerequests
      - volumerestorerequests
    verbs:
      - get
      - list
      - watch
