apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:use:storage-foundation:superadmin
  labels:
    heritage: deckhouse
    module: storage-foundation
    rbac.deckhouse.io/kind: use
    rbac.deckhouse.io/aggregate-to-role: superadmin
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/kind: use
        rbac.deckhouse.io/aggregate-to-storage-foundation-as: superadmin
rules: []
