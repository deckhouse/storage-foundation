apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:use:role:manager:storage-foundation
  labels:
    heritage: deckhouse
    module: storage-foundation
    rbac.deckhouse.io/kind: use
    rbac.deckhouse.io/aggregate-to-storage-foundation-as: admin
    rbac.deckhouse.io/aggregate-to-all-as: manager
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/kind: use
        rbac.deckhouse.io/aggregate-to-storage-foundation-as: manager
rules: []
