apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    heritage: deckhouse
    module: storage-foundation
    rbac.deckhouse.io/aggregate-to-kubernetes-as: manager
    rbac.deckhouse.io/kind: use
  name: d8:use:capability:module:storage-foundation:edit
rules:
  - apiGroups:
      - storage.deckhouse.io
    resources:
      - volumecapturerequests
      - volumerestorerequests
      - dataexports
      - dataimports
    verbs:
      - create
      - update
      - patch
      - delete
      - deletecollection
  - apiGroups:
      - snapshot.storage.k8s.io
    resources:
      - volumesnapshots
    verbs:
      - create
      - delete
      - deletecollection
      - patch
      - update
