---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-exporter
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-exporter")) | nindent 2 }}

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:{{ .Chart.Name }}:data-exporter
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-exporter")) | nindent 2 }}
rules:
  - apiGroups:
      - storage-foundation.deckhouse.io
    resources:
      - dataexports/status
      - dataexports
      - dataimports/status
      - dataimports
    verbs:
      - list
      - get
      - watch
      - update
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:{{ .Chart.Name }}:data-exporter
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-exporter")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: data-exporter
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:data-exporter
  apiGroup: rbac.authorization.k8s.io

---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: data-exporter
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-exporter")) | nindent 2 }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - update

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: data-exporter
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-exporter")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: data-exporter
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: Role
  name: data-exporter
  apiGroup: rbac.authorization.k8s.io
