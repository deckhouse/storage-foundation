---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-source-validator
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-source-validator")) | nindent 2 }}

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:{{ .Chart.Name }}:data-source-validator
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-source-validator")) | nindent 2 }}
rules:
  - apiGroups: [populator.storage.k8s.io]
    resources: [volumepopulators]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [list, watch, create, update, patch]

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:{{ .Chart.Name }}:data-source-validator
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-source-validator")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: data-source-validator
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:data-source-validator
  apiGroup: rbac.authorization.k8s.io
