{{- define "data_manager_controller_resources" }}
cpu: 10m
memory: 25Mi
{{- end }}

{{- $dhVersionIsDev := or (hasPrefix "dev" .Values.global.deckhouseVersion) (hasSuffix "dev" .Values.global.deckhouseVersion) }}
{{- $originIngressNamespace := "d8-user-authn" }}
{{- if or $dhVersionIsDev (semverCompare ">=1.77" .Values.global.deckhouseVersion) }}
{{- $originIngressNamespace = "kube-system" }}
{{- end }}

{{- if (.Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: data-manager-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-manager-controller")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: data-manager-controller
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
  resourcePolicy:
    containerPolicies:
    - containerName: "data-manager-controller"
      minAllowed:
        {{- include "data_manager_controller_resources" . | nindent 8 }}
      maxAllowed:
        cpu: 200m
        memory: 100Mi
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: data-manager-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-manager-controller" )) | nindent 2 }}
spec:
  minAvailable: {{ include "helm_lib_is_ha_to_value" (list . 1 0) }}
  selector:
    matchLabels:
      app: data-manager-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-manager-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "data-manager-controller")) | nindent 2 }}
spec:
  revisionHistoryLimit: 2
  {{- include "helm_lib_deployment_strategy_and_replicas_for_ha" . | nindent 2 }}
  selector:
    matchLabels:
      app: data-manager-controller
  template:
    metadata:
      labels:
        app: data-manager-controller
    spec:
      {{- include "helm_lib_priority_class" (tuple . "cluster-medium") | nindent 6 }}
      {{- include "helm_lib_node_selector" (tuple . "system") | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "system") | nindent 6 }}
      {{- include "helm_lib_module_pod_security_context_run_as_user_nobody" . | nindent 6 }}
      {{- include "helm_lib_pod_anti_affinity_for_ha" (list . (dict "app" "data-manager-controller")) | nindent 6 }}
      imagePullSecrets:
        - name: {{ .Chart.Name }}-module-registry
      serviceAccountName: data-manager-controller
      containers:
        - name: data-manager-controller
          {{- include "helm_lib_module_container_security_context_pss_restricted_flexible" (dict "ro" true "seccompProfile" true) | nindent 10 }}
          image: {{ include "helm_lib_module_image" (list . "dataManagerController") }}
          imagePullPolicy: IfNotPresent
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
              scheme: HTTP
            initialDelaySeconds: 5
            failureThreshold: 2
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
            periodSeconds: 1
            failureThreshold: 3
          resources:
            requests:
              {{- include "helm_lib_module_ephemeral_storage_only_logs" . | nindent 14 }}
{{- if not ( .Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
              {{- include "data_manager_controller_resources" . | nindent 14 }}
{{- end }}
          env:
            - name: LOG_LEVEL
{{- if eq .Values.storageFoundation.logLevel "ERROR" }}
              value: "0"
{{- else if eq .Values.storageFoundation.logLevel "WARN" }}
              value: "1"
{{- else if eq .Values.storageFoundation.logLevel "INFO" }}
              value: "2"
{{- else if eq .Values.storageFoundation.logLevel "DEBUG" }}
              value: "3"
{{- else if eq .Values.storageFoundation.logLevel "TRACE" }}
              value: "4"
{{- end }}
            - name: CONTROLLER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ORIGIN_INGRESS_NAMESPACE
              value: {{ $originIngressNamespace | quote }}
            - name: HA_MODE
              value: {{ include "helm_lib_is_ha_to_value" (list . "true" "false") | quote }}
            - name: ingressClassName
              value: {{ include "helm_lib_module_ingress_class" . | quote }}
            - name: ingressPublicDomain
              value: {{ include "helm_lib_module_public_domain" (list . "%s") | quote }}
