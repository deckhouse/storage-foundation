# Based on deckhouse/storage-e2e/.github/templates/e2e-tests.yml
# See https://github.com/deckhouse/storage-e2e#enabling-e2e-in-your-module

name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  e2e:
    # Heavy e2e runs only when the PR carries the e2e/run label.
    if: ${{ contains(github.event.pull_request.labels.*.name, 'e2e/run') }}
    uses: deckhouse/storage-e2e/.github/workflows/e2e.yml@main
    with:
      module_slug: ${{ vars.MODULE_NAME }}
      module_path: e2e
      test_package: ./tests/
      cluster_config: e2e/tests/cluster_config.yml
      module_image_tag: pr${{ github.event.pull_request.number }}
      # cluster_provider: dvp       # dvp (default) | commander
      # label_filter: "!stress-test" # optional override when no e2e/label:* labels
      # storage_e2e_ref: main        # optional
      # test_timeout: 90m            # optional
    secrets: inherit
