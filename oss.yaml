- name: external-attacher
  link: https://github.com/kubernetes-csi/external-attacher
  description: CSI external-attacher sidecar that calls ControllerPublish/Unpublish for CSI drivers.
  logo: https://avatars.githubusercontent.com/u/52698954?s=200&v=4
  license: Apache License 2.0
  id: csi-external-attacher
  versions:
    - condition:
        k8s: ["1.20"]
      version: v4.11.0

- name: external-provisioner
  link: https://github.com/kubernetes-csi/external-provisioner
  description: CSI external-provisioner sidecar that creates and deletes CSI volumes.
  logo: https://avatars.githubusercontent.com/u/52698954?s=200&v=4
  license: Apache License 2.0
  id: csi-external-provisioner
  versions:
    # Built from upstream tag v6.2.0 + in-repo patches under patches/v6.2.0/:
    #   001-fix-cve.patch     - CVE dependency bumps (grpc, otel).
    #   002-vrr-executor.patch - VolumeRestoreRequest executor with Block/
    #                            Filesystem VolumeMode support (CSI
    #                            VolumeCapabilities built from VRR spec).
    # Source of truth for the executor is the Deckhouse fork branch
    # d8-63742164-vrr; 002 is the diff of that branch against v6.2.0 (excluding
    # vendor). The storage-foundation/api dependency is pinned via a Go
    # pseudo-version to commit b97b1e1 (extended VRR API: volumeMode/fsType/
    # accessModes); switch to a published api/vX.Y.Z tag later.
    - condition:
        k8s: ["1.20"]
      version: v6.2.0
    - condition:
        k8s: ["1.34"]
      version: v6.2.0

- name: external-resizer
  link: https://github.com/kubernetes-csi/external-resizer
  description: CSI external-resizer sidecar that handles online and offline volume expansion.
  logo: https://avatars.githubusercontent.com/u/52698954?s=200&v=4
  license: Apache License 2.0
  id: csi-external-resizer
  versions:
    - condition:
        k8s: ["1.20"]
      version: v1.14.0
    - condition:
        k8s: ["1.34"]
      version: v2.1.0

- name: external-snapshotter (csi-snapshotter sidecar)
  link: https://github.com/kubernetes-csi/external-snapshotter
  description: CSI external-snapshotter sidecar (csi-snapshotter binary). Built by cloning the upstream tag and applying CVE patches under images/csi-external-snapshotter/patches/<version>/.
  logo: https://avatars.githubusercontent.com/u/52698954?s=200&v=4
  license: Apache License 2.0
  id: csi-external-snapshotter
  versions:
    - condition:
        k8s: ["1.20"]
      version: d8-63742164-vsc-only

- name: livenessprobe
  link: https://github.com/kubernetes-csi/livenessprobe
  description: CSI liveness-probe sidecar.
  logo: https://avatars.githubusercontent.com/u/52698954?s=200&v=4
  license: Apache License 2.0
  id: csi-livenessprobe
  versions:
    - condition:
        k8s: ["1.20"]
      version: v2.18.0

- name: node-driver-registrar
  link: https://github.com/kubernetes-csi/node-driver-registrar
  description: CSI node-driver-registrar sidecar that registers the CSI driver with kubelet.
  logo: https://avatars.githubusercontent.com/u/52698954?s=200&v=4
  license: Apache License 2.0
  id: csi-node-driver-registrar
  versions:
    - condition:
        k8s: ["1.20"]
      version: v2.16.0

- name: snapshot-controller
  link: https://github.com/kubernetes-csi/external-snapshotter
  description: The controller is required for CSI snapshotting to work and is not specific to any CSI driver. Built by cloning the upstream tag and applying CVE patches under images/snapshot-controller/patches/.
  logo: https://avatars.githubusercontent.com/u/52698954?s=200&v=4
  license: Apache License 2.0
  id: snapshot-controller
  version: d8-63742164-vsc-only
