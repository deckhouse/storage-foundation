name: storage-foundation
stage: "Experimental"
subsystems:
  - storage
  - infrastructure
namespace: d8-storage-foundation
descriptions:
  en: "Enables snapshot support, volume cloning, and secure HTTP-based export/import of persistent volume contents for compatible CSI drivers in a Kubernetes cluster."
  ru: "Включает поддержку снапшотов, клонирование томов и безопасный экспорт/импорт содержимого постоянных томов по протоколу HTTP для совместимых CSI-драйверов в кластере Kubernetes."
requirements:
  deckhouse: ">= 1.74"
  modules:
    state-snapshotter: ">= 0.0.0"
