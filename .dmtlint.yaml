linters-settings:
  container:
    exclude-rules:
      liveness-probe:
        - kind: Deployment
          name: snapshot-controller
          container: snapshot-controller
        - kind: Deployment
          name: snapshot-validation-webhook
          container: snapshot-validation
      readiness-probe:
        - kind: Deployment
          name: snapshot-controller
          container: snapshot-controller
        - kind: Deployment
          name: snapshot-validation-webhook
          container: snapshot-validation
  no-cyrillic:
    exclude-rules:
      directories:
        - hack/
      files:
        # handler_fuzz_test.go seeds the fuzzer with intentional random Unicode
        # (including Cyrillic) as adversarial input; it is test data, not prose.
        - images/data-exporter/cmd/handler_fuzz_test.go
